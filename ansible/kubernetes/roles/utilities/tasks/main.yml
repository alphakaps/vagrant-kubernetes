- name: Copy of csr.conf & installUtilities.sh & metallb-config.yml & traefik-values.yml && keycloak-values.yml & authentik-values.yml & pv.yml & httproute-authentik.yml to the remote servers
  ansible.builtin.template:
    src: "{{ item }}"
    dest: $HOME
    mode: '0755'
  with_items:
    - templates/csr.conf
    - templates/installUtilities.sh
    - templates/metallb-config.yml
    - templates/traefik-values.yml
    - templates/keycloak-values.yml
    - templates/authentik-values.yml
    - templates/pv.yml
    - templates/httproute-authentik.yml
    - templates/app3-serviceaccount.yml
    - templates/app3-deployment.yml
    - templates/app3-service.yml
    - templates/app3-httproute.yml

- name: Execute the installUtilities.sh script
  command: /bin/sh $HOME/installUtilities.sh

- name: Deleting csr.conf & installUtilities.sh & metallb-config.yml & traefik-values.yml && keycloak-values.yml & authentik-values.yml & pv.yml & httproute-authentik.yml, tls.key, tls.crt, csr.csr to the remote servers
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - $HOME/csr.conf
    - $HOME/installUtilities.sh
    - $HOME/metallb-config.yml
    - $HOME/traefik-values.yml
    - $HOME/keycloak-values.yml
    - $HOME/authentik-values.yml
    - $HOME/pv.yml
    - $HOME/httproute-authentik.yml
    - $HOME/app3-serviceaccount.yml
    - $HOME/app3-deployment.yml
    - $HOME/app3-service.yml
    - $HOME/app3-httproute.yml
    - $HOME/tls.key
    - $HOME/tls.crt
    - $HOME/csr.csr