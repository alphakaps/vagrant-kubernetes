apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  app-forwardauth.yaml: |
    version: 1
    metadata:
      name: app-forwardauth-setup
    entries:
      # Providers
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: app-provider
        attrs:
          name: app-provider
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          external_host: https://app.traefik.lc
          mode: forward_single

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: prometheus-provider
        attrs:
          name: prometheus-provider
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          external_host: https://prometheus.traefik.lc
          mode: forward_single

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: alertmanager-provider
        attrs:
          name: alertmanager-provider
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          external_host: https://alertmanager.traefik.lc
          mode: forward_single

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: grafana-provider
        attrs:
          name: grafana-provider
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          external_host: https://grafana.traefik.lc
          mode: forward_single

      # Applications
      - model: authentik_core.application
        state: present
        identifiers:
          slug: app
        attrs:
          name: app
          slug: app
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, app-provider]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: prometheus
        attrs:
          name: prometheus
          slug: prometheus
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, prometheus-provider]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: alertmanager
        attrs:
          name: alertmanager
          slug: alertmanager
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, alertmanager-provider]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: grafana
          slug: grafana
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, grafana-provider]]

      # Embedded outpost — includes all providers
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          name: authentik Embedded Outpost
          type: proxy
          config:
            authentik_host: https://authentik.traefik.lc
            authentik_host_insecure: true
          providers:
            - !Find [authentik_providers_proxy.proxyprovider, [name, app-provider]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, prometheus-provider]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, alertmanager-provider]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, grafana-provider]]
