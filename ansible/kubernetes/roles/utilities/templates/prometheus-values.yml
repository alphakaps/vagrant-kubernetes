kubeStateMetrics:
  enabled: true

prometheus:
  ingress:
    enabled: false
  prometheusSpec:
    retention: 10d
    nodeSelector:
      kubernetes.io/hostname: node02
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Discover ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

alertmanager:
  ingress:
    enabled: false
  alertmanagerSpec:
    storage: {}

grafana:
  ingress:
    enabled: false
  persistence:
    enabled: false
  grafana.ini:
    auth.proxy:
      enabled: true
      header_name: X-authentik-username
      header_property: username
      auto_sign_up: true
    auth:
      disable_login_form: true
  # Community dashboards pulled from grafana.com at startup
  dashboards:
    default:
      traefik:
        gnetId: 17347
        revision: 9
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-views-pods:
        gnetId: 15760
        revision: 28
        datasource: Prometheus
