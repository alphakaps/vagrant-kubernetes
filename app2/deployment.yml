apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld
  #namespace: helloworld2
  labels:
    app: helloworld
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helloworld
  template:
    metadata:
      labels:
        app: helloworld
    spec:
      containers:
      - name: helloworld
        image: alphakaps/helloworld
        ports:
        - containerPort: 8080
